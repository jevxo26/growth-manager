[providers.node]
nodeVersion = "20"

[phases.setup]
nixPkgs = ["...", "nodejs"]
aptPkgs = [
    "...",
    "wget",
    "ca-certificates",
    "libnss3", 
    "libxss1", 
    "libasound2", 
    "libatk1.0-0",
    "libatk-bridge2.0-0",
    "libcups2",
    "libdrm2",
    "libxkbcommon0",
    "libxcomposite1",
    "libxdamage1",
    "libxrandr2",
    "libgbm1",
    "libpango-1.0-0",
    "libcairo2",
    "libx11-xcb1",
    "fonts-liberation",
    "libglib2.0-0",
    "xvfb"
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm start"
